<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle Financeiro Mensal</title>
    <style>
      :root {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        color: #f7fffd;
        background: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.14), transparent 44%),
          linear-gradient(315deg, rgba(4, 18, 22, 0.3), transparent 48%),
          #0f766e;
      }

      main {
        width: 100%;
        padding: 42px;
        display: grid;
        gap: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .mark {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: #e6f7ef;
        color: #0f766e;
        font-weight: 900;
        font-size: 1.7rem;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.22);
      }

      h1 {
        margin: 0;
        font-size: 1.95rem;
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        margin: 6px 0 0;
        color: rgba(247, 255, 253, 0.78);
        font-weight: 700;
      }

      .loading {
        display: grid;
        gap: 10px;
      }

      .loading span {
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(247, 255, 253, 0.76);
      }

      .bar {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.2);
      }

      .bar::before {
        content: "";
        display: block;
        width: 48%;
        height: 100%;
        border-radius: inherit;
        background: #ffffff;
        animation: load 1.15s ease-in-out infinite;
      }

      @keyframes load {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(230%);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <div class="mark">R$</div>
        <div>
          <h1>Controle Financeiro Mensal</h1>
          <p>Do primeiro lançamento ao fechamento do mês</p>
        </div>
      </div>
      <div class="loading">
        <span>Preparando seu painel</span>
        <div class="bar" aria-hidden="true"></div>
      </div>
    </main>
  </body>
</html>
